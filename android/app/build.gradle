plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystorePropertiesFile.withReader('UTF-8') { reader ->
        keystoreProperties.load(reader)
    }
}

android {
    namespace "com.ai2th.linxr"
    compileSdk 35

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    aaptOptions {
        // Prevent aapt2 from decompressing .gz assets — handled at runtime
        // Also skip compression on kernel/initrd (already compressed binaries)
        noCompress "gz", "virt"
    }

    defaultConfig {
        applicationId "com.ai2th.linxr"
        minSdk 26
        targetSdk 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        ndk {
            // NEW-13: include x86_64 so the APK can run natively on x86_64 emulators
            // (LDPlayer) without relying on Houdini. libflutter.so for arm64-v8a uses
            // AES+PCLMULQDQ CPU features which Houdini cannot emulate, causing
            // SIGABRT in FlutterJNI.nativeInit. Native x86_64 build avoids this entirely.
            abiFilters "arm64-v8a", "x86_64"
        }
    }

    signingConfigs {
        debug {
            storeFile file("debug.keystore")
            storePassword "android"
            keyAlias "debug"
            keyPassword "android"
        }
        release {
            if (keystorePropertiesFile.exists()) {
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            } else {
                storeFile file("debug.keystore")
                storePassword "android"
                keyAlias "debug"
                keyPassword "android"
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    packagingOptions {
        jniLibs {
            // Force extraction of native libs to disk so ProcessBuilder can execute them.
            useLegacyPackaging true
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"
    // NEW-12: pin to 1.10.1 to avoid androidx.activity 1.8.x transitively pulled
    // by androidx.core 1.12.0. 1.8.x references android.window.OnBackAnimationCallback
    // (API 33+) which causes Dalvik class verification to fail on Android 9 (LDPlayer).
    implementation "androidx.core:core-ktx:1.10.1"

    androidTestImplementation 'androidx.test.ext:junit:1.1.5'
    androidTestImplementation 'androidx.test:runner:1.5.2'
    androidTestImplementation 'com.github.mwiede:jsch:0.2.18'
}
